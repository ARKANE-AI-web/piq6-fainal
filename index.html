<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposalIQ - منصة العروض الذكية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* إضافة تنسيقات أساسية لضمان عمل الواجهة */
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #ca8a04;
            --border: #e5e7eb;
            --muted: #6b7280;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f9fafb; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--border); background: transparent; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; }
        .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
        .modal { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; position: relative; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .s-draft { background: #eee; }
        .s-pending { background: #fef9c3; color: #854d0e; }
        .s-approved { background: #dcfce7; color: #166534; }
        .live-badge { color: red; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <nav style="background: #1e293b; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white;">
        <div style="font-weight: bold; font-size: 1.5rem;">ProposalIQ</div>
        <div id="navActions"></div>
    </nav>

    <div id="pageHome" class="page active">
        <h1>مرحباً بك في ProposalIQ</h1>
        <p>المنصة الأذكى لإنشاء وإدارة العروض الفنية والمالية.</p>
        <button class="btn btn-primary" onclick="showModal('registerModal')">ابدأ الآن مجاناً</button>
    </div>

    <div id="pageManagerDash" class="page">
        <h2>لوحة تحكم المدير: <span id="mgrName"></span></h2>
        <div id="mgrPlanBadge"></div>
        <div id="mgrActivateSection"></div>
        <hr>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
            <div>إجمالي العروض: <span id="mgrTotalProps">0</span></div>
            <div>عروض بانتظار الاعتماد: <span id="mgrPendingCount">0</span></div>
            <div>المندوبون: <span id="mgrTotalAgents">0</span></div>
        </div>
        <h3>طلبات الاعتماد</h3>
        <div id="mgrApprovalsList"></div>
        <h3>كافة العروض</h3>
        <div id="mgrAllProposals"></div>
    </div>

    <div id="pageAgentDash" class="page">
        <h2>لوحة تحكم المندوب: <span id="agentName"></span></h2>
        <p id="agentCompanyLabel"></p>
        <div id="agentApprovedAlert" class="alert alert-success" style="display:none;"></div>
        <div id="agentProposalList"></div>
    </div>

    <div id="registerModal" class="modal-overlay">
        <div class="modal">
            <h3>إنشاء حساب جديد</h3>
            <input type="hidden" id="selectedRole" value="manager">
            <input type="text" id="regCompany" placeholder="اسم الشركة" style="width:100%; margin-bottom:10px;">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" style="width:100%; margin-bottom:10px;">
            <input type="password" id="regPassword" placeholder="كلمة المرور" style="width:100%; margin-bottom:10px;">
            <input type="password" id="regPassword2" placeholder="تأكيد كلمة المرور" style="width:100%; margin-bottom:10px;">
            <div id="regError" style="color:red; display:none; margin-bottom:10px;"></div>
            <button class="btn btn-primary" style="width:100%" onclick="doRegister()">تسجيل</button>
            <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeModal('registerModal')">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, query, where, getDocs, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AlzaSyChxttvld06MmlSTD4JB11mYZNA06AP4T8",
            authDomain: "proposaliq-97d80.firebaseapp.com",
            projectId: "proposaliq-97d80",
            storageBucket: "proposaliq-97d80.firebasestorage.app",
            messagingSenderId: "183384951638",
            appId: "1:183384951638:web:8c0d6ce87c0c22f14064f7",
            measurementId: "G-HTD6YLRY8X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_PASS = 'ARKANE2026';
        const PLAN_CONFIG = {
            free: { name: 'مجاني', quota: 3, months: 0 },
            basic_monthly: { name: 'شهري أساسي', quota: 30, months: 1 },
            advanced_monthly: { name: 'شهري متقدم', quota: 150, months: 1 }
        };

        let currentUser = null;
        let currentUserDoc = null;
        let liveUnsubscribe = null;

        // --- Utilities ---
        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }

        function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        function formatAmount(n) { return Math.round(n || 0).toLocaleString('ar-SA'); }

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id)?.classList.add('active');
            if (id === 'pageManagerDash') refreshManagerDash();
            if (id === 'pageAgentDash') refreshAgentDash();
        };

        window.showModal = (id) => document.getElementById(id)?.classList.add('open');
        window.closeModal = (id) => document.getElementById(id)?.classList.remove('open');

        // --- Auth Actions ---
        window.doRegister = async () => {
            const role = document.getElementById('selectedRole').value;
            const company = document.getElementById('regCompany').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const pass = document.getElementById('regPassword').value;
            const pass2 = document.getElementById('regPassword2').value;

            if (!company || !email || !pass) return alert("يرجى ملء جميع الحقول");
            if (!isValidEmail(email)) return alert("صيغة البريد غير صحيحة");
            if (pass !== pass2) return alert("كلمتا المرور غير متطابقتين");

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const uid = cred.user.uid;
                const companyCode = 'CO-' + Math.random().toString(36).substr(2, 6).toUpperCase();

                const companyRef = await addDoc(collection(db, 'companies'), {
                    name: company, code: companyCode, managerId: uid,
                    plan: 'free', quota: 3, quotaUsed: 0, createdAt: serverTimestamp()
                });

                await setDoc(doc(db, 'users', uid), {
                    email, company, role: 'manager', companyId: companyRef.id,
                    plan: 'free', quota: 3, quotaUsed: 0, createdAt: serverTimestamp()
                });

                closeModal('registerModal');
            } catch (e) {
                alert("خطأ في التسجيل: " + e.message);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            window.location.reload();
        };

        onAuthStateChanged(auth, async user => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) {
                    currentUserDoc = { id: user.uid, ...snap.data() };
                    updateNavBar(currentUserDoc);
                    showPage(currentUserDoc.role === 'manager' ? 'pageManagerDash' : 'pageAgentDash');
                }
            } else {
                updateNavBar(null);
                showPage('pageHome');
            }
        });

        function updateNavBar(u) {
            const nav = document.getElementById('navActions');
            if (!u) {
                nav.innerHTML = `<button class="btn btn-outline" onclick="showModal('registerModal')">دخول / تسجيل</button>`;
                return;
            }
            nav.innerHTML = `
                <span style="margin-left:10px;">${escapeHtml(u.company)}</span>
                <button class="btn btn-outline" onclick="logout()">خروج</button>
            `;
        }

        // --- Dashboard Logic ---
        async function refreshManagerDash() {
            if (!currentUserDoc) return;
            document.getElementById('mgrName').textContent = currentUserDoc.company;
            
            const propsQ = query(collection(db, 'proposals'), where('companyId', '==', currentUserDoc.companyId));
            const propsSnap = await getDocs(propsQ);
            document.getElementById('mgrTotalProps').textContent = propsSnap.size;
            
            // إضافة منطق عرض القوائم هنا...
        }

        async function refreshAgentDash() {
            if (!currentUserDoc) return;
            document.getElementById('agentName').textContent = currentUserDoc.email;
            // إضافة منطق عرض العروض الخاصة بالمندوب...
        }

        // تحسين الـ Snapshots للتنبيهات الحية
        function startLiveTracking() {
            if (liveUnsubscribe) liveUnsubscribe();
            if (!currentUserDoc?.companyId) return;
            
            const liveQ = query(collection(db, 'proposals'), 
                where('companyId', '==', currentUserDoc.companyId), 
                where('isClientLive', '==', true));
                
            liveUnsubscribe = onSnapshot(liveQ, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added' || change.type === 'modified') {
                        const d = change.doc.data();
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: 'info',
                            title: `🔴 العميل يقرأ عرض: "${d.subject}" الآن`,
                            showConfirmButton: false,
                            timer: 5000
                        });
                    }
                });
            });
        }

    </script>
</body>
</html>

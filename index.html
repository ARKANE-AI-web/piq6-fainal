<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposalIQ - منصة العروض الذكية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f9fafb;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: #333;
        }

        /* Navigation */
        nav {
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Layout */
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid white; background: transparent; color: white; }
        .btn-full { width: 100%; margin-top: 10px; }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        /* Form Inputs */
        .form-group { margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box; /* لضمان عدم خروج الإدخال عن الحواف */
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 1.5rem; font-weight: bold;">ProposalIQ</div>
        <div id="navActions">
            <button class="btn btn-outline" onclick="showModal('loginModal')">تسجيل الدخول</button>
        </div>
    </nav>

    <div class="container">
        <div id="pageHome" class="page active">
            <div style="text-align: center; padding: 50px 0;">
                <h1>مرحباً بك في منصة ProposalIQ</h1>
                <p>قم بإنشاء عروضك الفنية والمالية احترافياً وبكل سهولة.</p>
                <button class="btn btn-primary" onclick="showModal('registerModal')">ابدأ مجاناً الآن</button>
            </div>
        </div>

        <div id="pageManagerDash" class="page">
            <h2>لوحة تحكم المدير</h2>
            <div id="managerStats"></div>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay">
        <div class="modal">
            <h3>إنشاء حساب جديد</h3>
            <div class="form-group">
                <input type="text" id="regCompany" placeholder="اسم الشركة أو المؤسسة">
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="كلمة المرور">
            </div>
            <button class="btn btn-primary btn-full" onclick="handleRegister()">تأكيد التسجيل</button>
            <button class="btn btn-full" style="background:#eee;" onclick="closeModal('registerModal')">إغلاق</button>
        </div>
    </div>

    <script type="module">
        // Firebase Logic will go here
        window.showModal = (id) => document.getElementById(id).classList.add('open');
        window.closeModal = (id) => document.getElementById(id).classList.remove('open');
        
        window.handleRegister = () => {
            const company = document.getElementById('regCompany').value;
            if(!company) {
                Swal.fire('تنبيه', 'يرجى كتابة اسم الشركة', 'warning');
                return;
            }
            // هنا يتم استدعاء دوال الفايربيس التي أصلحناها سابقاً
            console.log("Registering...", company);
        };
    </script>
</body>
</html>
